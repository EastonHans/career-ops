# Career-Ops Profile Configuration
# Copy this file to config/profile.yml and fill in your details.
# This is the single source of truth for your personal data across all modes.

candidate:
  full_name: "Easton Hans"
  email: "eh.hanseaston@gmail.com"
  phone: "+254754376221"
  location: "Nairobi, Kenya"
  linkedin: "www.linkedin.com/in/easton-michura"
  portfolio_url: "https://eastonhans.vercel.app/"
  github: "github.com/eastonhans"

target_roles:
  # Your North Star roles — what you're optimizing for
  primary:
    - "Frontend Developer"
    - "UI/UX Designer"
  # Archetypes help the evaluation system score fit
  archetypes:
    - name: "Full-Stack Engineer"
      level: "Junior/Mid"
      fit: "primary"        # primary = dream role, secondary = good fit, adjacent = stretch
    - name: "UI/UX Designer"
      level: "Junior/Mid"
      fit: "secondary"
    - name: "Machine Learning Engineer"
      level: "Junior/Mid"
      fit: "adjacent"

narrative:
  # Your professional headline (1 line)
  headline: "Creative Frontend Developer & UI/UX Designer | Passionate about building intuitive user experiences"
  # Your exit story — what makes you unique
  exit_story: "I transitioned into frontend development to bring my designs to life. I thrive at the intersection of design and code, creating seamless user experiences that are both beautiful and functional."
  # Your top 3-5 superpowers
  superpowers:
    - "Creative problem-solving"
    - "User-centered design"
    - "Cross-functional collaboration"
  # Proof points — projects, articles, case studies with measurable impact
  proof_points:
  - name: "Color Clock"
    url: "https://colour-clock.vercel.app"
    hero_metric: "React app mapping real-time HSL color to time, deployed on Vercel"
  # Optional: dashboard/demo URL with credentials
  # dashboard:
  #   url: "https://janesmith.dev/demo"
  #   password: "demo-2026"

compensation:
  target_range: "Ksh.10,000 - 150,000"     # Your target total comp
  currency: "Ksh"                    # Currency code (e.g., USD, EUR, Ksh)
  minimum: "Ksh.10,000"               # Walk-away number
  location_flexibility: "Remote preferred, 1 week/month on-site possible"

location:
  country: "Kenya"
  city: "Nairobi"
  timezone: "EAT (UTC+3)"
  visa_status: "Citizen" # Citizen, Work Permit, Student Visa, etc.
  # For remote roles outside your country:
  # onsite_availability: "1 week/month in any city"

cv:
  output_format: "html" # "html" (default) or "latex"
  # (Optional) Canva resume design ID for visual CV generation via /career-ops pdf.
  # Find it in your Canva design URL: https://www.canva.com/design/DAxxxxxxx/...
  # The ID starts with "D" and is 11 characters long.
